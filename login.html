<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JobInsight</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="./css/login-style.css">
</head>
<body>

    <!-- Back to Home Link -->
    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <!-- Main Container centered on screen -->
    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Branding Header -->
            <div class="login-header">
                <div class="logo">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> JobInsight
                </div>
                <h2>Welcome Back</h2>
                <p>Log in to access real-time job market analytics</p>
            </div>

            <!-- Form -->
            <form id="loginForm" novalidate>
                
                <!-- Server/General Error Message Box -->
                <div class="error-summary" id="errorSummary"></div>

                <!-- Email Input Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="username@gmail.com" required>
                    </div>
                    <span class="error-msg" id="emailError"></span>
                </div>

                <!-- Password Input Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <!-- Contextual Form Actions (Remember Me / Forgot Pwd) -->
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-pwd" onclick="alert('Password reset process triggered via email.')">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <!-- Registration Redirect Link -->
            <div class="login-footer">
                <p>Don't have an account? <a href="#" onclick="alert('Redirecting to Registration...')">Create an account</a></p>
            </div>

        </div>
    </div>

    <!-- JavaScript Validation -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Stop default form handling submission

            // Grab elements
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const errorSummary = document.getElementById('errorSummary');

            // Reset field states
            let isValid = true;
            emailError.textContent = '';
            passwordError.textContent = '';
            errorSummary.style.display = 'none';
            emailInput.parentElement.classList.remove('invalid');
            passwordInput.parentElement.classList.remove('invalid');

            // 1. Email Validations
            const emailValue = emailInput.value.trim();
            if (!emailValue) {
                emailError.textContent = 'Email address is required.';
                emailInput.parentElement.classList.add('invalid');
                isValid = false;
            } else if (!emailValue.endsWith('@gmail.com')) {
                emailError.textContent = 'Please enter a valid Gmail address (must end with @gmail.com).';
                emailInput.parentElement.classList.add('invalid');
                isValid = false;
            }

            // 2. Password Validations
            const passwordValue = passwordInput.value;
            if (!passwordValue) {
                passwordError.textContent = 'Password is required.';
                passwordInput.parentElement.classList.add('invalid');
                isValid = false;
            } else if (passwordValue.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters.';
                passwordInput.parentElement.classList.add('invalid');
                isValid = false;
            }

            // Processing successful form submission
            if (isValid) {
                alert('Success! Form is valid. Simulating data token match... Welcome to JobInsight.');
                // backend routing would occur here
            }
        });
    </script>
</body>
</html>
